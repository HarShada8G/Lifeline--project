<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BloodConnect - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #ff4d4d, #b30000);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      border-radius: 20px;
      padding: 20px;
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);} 
      to { opacity: 1; transform: translateY(0);} 
    }
  </style>
</head>
<body>
  <div class="card bg-dark text-white" style="width: 350px;">
    <h3 class="text-center">BloodConnect</h3>
    <input class="form-control my-2" placeholder="Email">
    <input type="password" class="form-control my-2" placeholder="Password">
    <button class="btn btn-danger w-100" onclick="window.location.href='dashboard.html'">Login</button>
    <p class="text-center mt-2">or</p>
    <button class="btn btn-outline-light w-100">Signup</button>
  </div>
</body>
</html>
