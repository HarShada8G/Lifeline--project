<!-- ======================= LIST.HTML ======================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donors & Patients</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center">Available Donors & Patients</h2>
    <div id="list" class="row"></div>
  </div>

  <script>
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    let container = document.getElementById('list');

    users.forEach(u => {
      container.innerHTML += `
        <div class="col-md-4">
          <div class="card p-3 m-2 shadow">
            <h5>${u.name}</h5>
            <p>Role: ${u.role}</p>
            <p>Blood: ${u.blood}</p>
            <p>Age: ${u.age}</p>
            <p>Contact: ${u.contact}</p>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
