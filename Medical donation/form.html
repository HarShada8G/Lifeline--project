<!-- ======================= FORM.HTML ======================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h3 class="text-center">Medical Details</h3>
    <form onsubmit="saveData(event)">
      <input class="form-control my-2" placeholder="Name" id="name" required>
      <input class="form-control my-2" placeholder="Age" id="age" required>
      <select class="form-control my-2" id="gender">
        <option>Male</option>
        <option>Female</option>
      </select>
      <select class="form-control my-2" id="blood">
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>O+</option><option>O-</option>
        <option>AB+</option><option>AB-</option>
      </select>
      <input class="form-control my-2" placeholder="Contact" id="contact" required>
      <button class="btn btn-success w-100">Submit</button>
    </form>
  </div>

  <script>
    function saveData(e){
      e.preventDefault();
      let data = {
        name: document.getElementById('name').value,
        age: document.getElementById('age').value,
        gender: document.getElementById('gender').value,
        blood: document.getElementById('blood').value,
        contact: document.getElementById('contact').value,
        role: new URLSearchParams(window.location.search).get('role')
      };

      let users = JSON.parse(localStorage.getItem('users') || '[]');
      users.push(data);
      localStorage.setItem('users', JSON.stringify(users));

      window.location.href = 'list.html';
    }
  </script>
</body>
</html>
