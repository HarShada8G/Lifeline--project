<!-- ======================= DASHBOARD.HTML ======================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container text-center mt-5">
    <h2>Choose Your Role</h2>
    <div class="row mt-4">
      <div class="col-md-6">
        <div class="card p-4 shadow">
          <h4>Donor</h4>
          <button class="btn btn-danger" onclick="window.location.href='form.html?role=donor'">Continue</button>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card p-4 shadow">
          <h4>Patient</h4>
          <button class="btn btn-primary" onclick="window.location.href='form.html?role=patient'">Continue</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
